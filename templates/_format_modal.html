<div id="format-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modal-title">Select Format</h2>
    <div id="modal-error" class="hidden" style="background:#5a1a1a;border:1px solid #c33;border-radius:6px;padding:10px;margin-bottom:12px;color:#f88"></div>
    <div id="modal-formats"></div>
    <div id="modal-subs"></div>
    <button id="download-btn" onclick="startDownload()" disabled>Download</button>
    <div id="progress" class="hidden">
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <p id="progress-text"></p>
    </div>
  </div>
</div>

<script>
function escapeHtml(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s || ''));
  return d.innerHTML;
}

let selectedVideoId = null;
let selectedFormatId = null;
let selectedTitle = '';
let selectedThumb = '';
let selectedFormatLabel = '';
let selectedSubs = [];

function toggleSub(el) {
  var lang = el.getAttribute('data-lang');
  var idx = selectedSubs.indexOf(lang);
  if (idx === -1) {
    selectedSubs.push(lang);
    el.classList.add('selected');
  } else {
    selectedSubs.splice(idx, 1);
    el.classList.remove('selected');
  }
}

function showFormats(videoId, title, thumb) {
  selectedVideoId = videoId;
  selectedTitle = title;
  selectedThumb = thumb;
  selectedFormatId = null;
  selectedFormatLabel = '';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-formats').innerHTML = '<p class="loading">Loading formats...</p>';
  document.getElementById('modal-subs').innerHTML = '';
  document.getElementById('download-btn').disabled = true;
  document.getElementById('progress').classList.add('hidden');
  document.getElementById('modal-error').classList.add('hidden');
  document.getElementById('format-modal').classList.remove('hidden');

  // Check for failed tasks (retry support)
  fetch('/api/active-tasks').then(r => r.json()).then(tasks => {
    var fail = tasks.filter(function(t) { return t.video_id === videoId && t.status === 'error'; });
    if (fail.length) {
      var el = document.getElementById('modal-error');
      el.innerHTML = '<strong>Previous download failed:</strong> ' + escapeHtml(fail[0].error || 'unknown error') + '. Select a format below to retry.';
      el.classList.remove('hidden');
    }
  });

  fetch('/api/formats/' + videoId).then(r => r.json()).then(data => {
    if (data.error) { document.getElementById('modal-formats').innerHTML = '<p class="error">' + data.error + '</p>'; return; }
    const formatsEl = document.getElementById('modal-formats');
    formatsEl.innerHTML = '<h3>Video Formats</h3>';
    data.formats.forEach(f => {
      const div = document.createElement('div');
      div.className = 'format-option' + (f.hdr !== 'SDR' ? ' hdr' : '');
      div.onclick = () => {
        document.querySelectorAll('.format-option').forEach(el => el.classList.remove('selected'));
        div.classList.add('selected');
        selectedFormatId = f.format_id;
        selectedFormatLabel = f.height + 'p' + (f.hdr !== 'SDR' ? ' ' + f.hdr : '');
        document.getElementById('download-btn').disabled = false;
      };
      const size = f.filesize ? (f.filesize / 1024 / 1024).toFixed(1) + ' MB' : 'unknown';
      const hdrBadge = f.hdr !== 'SDR' ? `<span class="hdr-badge">${f.hdr}</span>` : '';
      const progressiveBadge = f.progressive ? `<span class="prog-badge" title="Can play while downloading">Play as it downloads</span>` : '';
      const currentBadge = f.format_id === data.current_format_id ? `<span class="current-badge">✓ Current</span>` : '';
      div.innerHTML = `${currentBadge}${hdrBadge} <strong>${f.height}p</strong> ${f.fps ? f.fps + 'fps' : ''} ${f.ext} ${f.vcodec ? '(' + f.vcodec.split('.')[0] + ')' : ''} ${progressiveBadge}<span class="size">${size}</span>`;
      if (f.format_id === data.current_format_id) {
        div.classList.add('current');
      }
      formatsEl.appendChild(div);
    });
    if (data.subtitles && Object.keys(data.subtitles).length > 0) {
      selectedSubs = Object.keys(data.subtitles);
      var html = '<h3>Subtitles</h3><div class="subs-pills">';
      Object.keys(data.subtitles).forEach(function(lang) {
        html += '<span class="sub-pill selected" data-lang="' + lang + '" onclick="toggleSub(this)">' + lang + '</span>';
      });
      html += '</div>';
      document.getElementById('modal-subs').innerHTML = html;
    } else {
      selectedSubs = [];
    }
  });
}

function closeModal() {
  document.getElementById('format-modal').classList.add('hidden');
}

async function startDownload() {
  if (!selectedVideoId || !selectedFormatId) return;
  document.getElementById('download-btn').disabled = true;
  document.getElementById('progress').classList.remove('hidden');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-text').textContent = 'Starting...';

  const res = await fetch('/api/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      video_id: selectedVideoId,
      format_id: selectedFormatId,
      title: selectedTitle,
      thumbnail: selectedThumb,
      format_label: selectedFormatLabel,
      subtitles: selectedSubs
    })
  });
  const data = await res.json();
  if (data.status !== 'started') {
    document.getElementById('progress-text').textContent = 'Error: could not start';
    return;
  }
  const taskId = data.task_id;

  document.getElementById('progress-text').textContent = 'Download started - see progress in toolbar';
  closeModal();

  const poll = setInterval(async () => {
    const r = await fetch('/api/progress/' + taskId);
    const evt = await r.json();
    const fill = document.getElementById('progress-fill');
    const text = document.getElementById('progress-text');
    if (evt.status === 'not_found' || !evt.status) {
      clearInterval(poll);
      text.textContent = 'Download complete!';
      setTimeout(() => { window.location.href = '/'; }, 1500);
      return;
    }
    const pct = evt.percent || 0;
    fill.style.width = pct + '%';
    if (evt.status === 'done') {
      clearInterval(poll);
      fill.style.width = '100%';
      text.textContent = 'Done! Video added to library.';
      setTimeout(() => { window.location.href = '/'; }, 2000);
    } else if (evt.status === 'error') {
      clearInterval(poll);
      text.textContent = 'Error: ' + (evt.error || 'unknown');
    } else {
      text.textContent = evt.status + '... ' + pct + '%';
    }
  }, 1500);
}
</script>
