{% extends "base.html" %}
{% block title %}Search - YouTube Cache{% endblock %}
{% block content %}
<div class="header-bar">
  <h1>Search YouTube</h1>
</div>

<div class="search-box">
  <input type="text" id="query" placeholder="Search for videos..." autofocus>
  <button onclick="search()">Search</button>
</div>

<div id="results" class="video-grid"></div>
<div id="progress-modal" class="modal hidden" style="z-index:1001">
  <div class="modal-content">
    <span class="close" onclick="document.getElementById('progress-modal').classList.add('hidden')">&times;</span>
    <h2>Downloading</h2>
    <div><div class="progress-bar"><div id="modal-progress-fill" style="width:0%"></div></div></div>
    <p id="modal-progress-text"></p>
  </div>
</div>

{% include "_format_modal.html" %}

<script>
document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

async function search() {
  const q = document.getElementById('query').value.trim();
  if (!q) return;
  const res = await fetch('/api/search?q=' + encodeURIComponent(q));
  const data = await res.json();
  const grid = document.getElementById('results');
  grid.innerHTML = '';
  if (data.error) { grid.innerHTML = '<p class="error">' + data.error + '</p>'; return; }
  for (const v of data) {
    const card = document.createElement('a');
    card.className = 'video-card';
    card.href = '#';
    card.onclick = e => { e.preventDefault(); showFormats(v.id, v.title, v.thumbnail); };
    const dur = v.duration ? Math.floor(v.duration / 60) + ':' + String(v.duration % 60).padStart(2, '0') : '';
    const badges = [];
    if (v.downloading) badges.push('<span class="badge downloading">Downloading…</span>');
    else if (v.downloaded) badges.push('<span class="badge downloaded">Downloaded</span>');
    const badgeHtml = badges.length ? '<div class="badges">' + badges.join('') + '</div>' : '';
    card.innerHTML = `<div class="thumb"><img src="${v.thumbnail}" alt="" loading="lazy"><span class="duration">${dur}</span>${badgeHtml}</div>
      <div class="info"><h3>${v.title}</h3><p class="channel">${v.channel || ''}</p></div>`;
    grid.appendChild(card);
  }
}
</script>
{% endblock %}
